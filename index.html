<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune Teller Game</title>
    <style>
        body {
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px 10px;
            color: #333;
        }

        h1 {
            font-family: "Snell Roundhand", "Apple Chancery", cursive;
            font-size: 3.5rem;
            margin: 0 0 20px 0;
            text-align: center;
        }

        /* 3D Container */
        .game-window {
            width: 300px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            margin-bottom: 10px; /* Reduced to bring result text closer */
        }

        #origami {
            width: 220px;
            height: 220px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
            transition: transform 0.4s ease;
        }

        .flap {
            fill: #ffffff;
            stroke: #d0d0d0;
            stroke-width: 1;
            transition: all 0.3s ease-in-out;
            transform-origin: center;
        }

        .shade { fill: #f9f9f9; }
        .dark { fill: #ececec; }

        .mode-v .top { transform: translateY(-30px) scaleY(0.4); }
        .mode-v .bottom { transform: translateY(30px) scaleY(0.4); }
        .mode-h .left { transform: translateX(-30px) scaleX(0.4); }
        .mode-h .right { transform: translateX(30px) scaleX(0.4); }

        /* MOVED AND UPDATED RESULT STYLING */
        #result {
            font-family: "Snell Roundhand", cursive;
            font-size: 2.8rem;
            text-align: center;
            min-height: 50px;
            margin-bottom: 30px;
            color: #d2691e;
            font-weight: bold;
        }

        /* NEW: Wrapper for Side-by-Side Layout */
        .layout-wrapper {
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
            align-items: flex-start;
        }

        /* Main Controls (Left Side) */
        .controls {
            flex: 2;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Suggestions Box (Right Side) */
        .suggestions-panel {
            flex: 1;
            min-width: 200px;
            background: #fafafa;
            border: 1px dashed #ccc;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .suggestions-panel h3 {
            margin: 0;
            font-size: 1rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }

        /* Clickable Suggestion Tags */
        .suggestion-tag {
            background: #e2e8f0;
            color: #2d3748;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            text-align: center;
            font-weight: 500;
        }

        .suggestion-tag:hover {
            background: #cbd5e0;
            transform: scale(1.02);
        }

        /* Input Styling */
        .row { display: flex; gap: 10px; }
        .group { flex: 1; display: flex; flex-direction: column; }
        
        label { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; color: #777; }
        
        input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .generator-box {
            background: #f0f4f8;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #cce0f0;
            margin-bottom: 5px;
        }

        .generator-row { display: flex; gap: 10px; }
        .generator-row input { flex: 2; border: 1px solid #aab7c4; }
        
        .btn-gen {
            flex: 1;
            background: #3182ce;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-gen:hover { background: #2b6cb0; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }

        .btn-play {
            background: #000;
            color: #fff;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn-play:hover { background: #333; }

        /* Mobile View: Stack columns if screen is small */
        @media (max-width: 768px) {
            .layout-wrapper {
                flex-direction: column;
            }
            .suggestions-panel {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <h1>Fortune Teller</h1>

    <div class="game-window">
        <svg id="origami" viewBox="0 0 200 200">
            <g class="top">
                <path class="flap" d="M100 100 L20 20 L180 20 Z" />
                <path class="flap dark" d="M100 100 L100 20 L20 20 Z" />
            </g>
            <g class="bottom">
                <path class="flap" d="M100 100 L20 180 L180 180 Z" />
                <path class="flap dark" d="M100 100 L100 180 L180 180 Z" />
            </g>
            <g class="left">
                <path class="flap" d="M100 100 L20 20 L20 180 Z" />
                <path class="flap shade" d="M100 100 L20 100 L20 180 Z" />
            </g>
            <g class="right">
                <path class="flap" d="M100 100 L180 20 L180 180 Z" />
                <path class="flap shade" d="M100 100 L180 100 L180 180 Z" />
            </g>
        </svg>
    </div>

    <div id="result"></div>

    <div class="layout-wrapper">
        <div class="controls">
            <div class="row">
                <div class="group">
                    <label>Corner (1-4)</label>
                    <input type="number" id="corner" value="3" min="1" max="4">
                </div>
                <div class="group">
                    <label>Number (1-100)</label>
                    <input type="number" id="num" value="7" min="1" max="100">
                </div>
            </div>

            <div class="generator-box">
                <label>Auto-Generate Outcomes by Topic</label>
                <div class="generator-row">
                    <input type="text" id="topicInput" placeholder="e.g., Animals, Colors, Cars...">
                    <button class="btn-gen" id="genBtn" onclick="generateWords()">Auto-Fill</button>
                </div>
            </div>

            <label>8 Possible Results</label>
            <div class="grid" id="flavorInputs">
                <input type="text" value="Chocolate">
                <input type="text" value="Strawberry">
                <input type="text" value="Vanilla">
                <input type="text" value="Lychee">
                <input type="text" value="Tropical">
                <input type="text" value="Cherry">
                <input type="text" value="Raspberry">
                <input type="text" value="Watermelon">
            </div>

            <button class="btn-play" onclick="runGame()">PLAY GAME</button>
        </div>

        <div class="suggestions-panel">
            <h3>Try a Topic:</h3>
            <div id="suggestion-container" style="display: flex; flex-direction: column; gap: 8px;">
                </div>
        </div>
    </div>

    <script>
        // The master list of ideas! Add as many as you want here.
        const topicIdeas = [
            "Ice Cream Flavors", 
            "Famous German Celebrities", 
            "Superpowers", 
            "Mythological Creatures",
            "Video Game Consoles",
            "Dog Breeds",
            "European Landmarks",
            "Action Movies",
            "Fast Food",
            "Gemstones",
            "Musical Instruments",
            "Tropical Fruits",
            "Sports Teams",
            "Types of Pasta"
        ];

        // This runs instantly when the website loads
        window.onload = function() {
            loadRandomSuggestions();
        };

        function loadRandomSuggestions() {
            const container = document.getElementById('suggestion-container');
            container.innerHTML = ""; // Clear existing
            
            // Create a copy of the array and shuffle it
            let shuffled = [...topicIdeas].sort(() => 0.5 - Math.random());
            
            // Pick the first 4 items from the shuffled list
            let selectedTopics = shuffled.slice(0, 4);

            // Create clickable tags for each selected topic
            selectedTopics.forEach(topic => {
                let tag = document.createElement('div');
                tag.className = 'suggestion-tag';
                tag.innerText = topic;
                tag.onclick = () => {
                    document.getElementById('topicInput').value = topic;
                    // Optional: You could even call generateWords() right here so it auto-runs when clicked!
                };
                container.appendChild(tag);
            });
        }

        async function generateWords() {
            const topic = document.getElementById('topicInput').value;
            const btn = document.getElementById('genBtn');
            
            if (!topic) {
                alert("Please enter a topic first!");
                return;
            }

            btn.innerText = "Loading...";
            
            try {
                const response = await fetch(`https://api.datamuse.com/words?ml=${topic}&max=8`);
                const data = await response.json();
                const inputs = document.querySelectorAll('#flavorInputs input');
                
                for (let i = 0; i < 8; i++) {
                    if (data[i]) {
                        const word = data[i].word;
                        inputs[i].value = word.charAt(0).toUpperCase() + word.slice(1);
                    } else {
                        inputs[i].value = "Mystery " + (i + 1);
                    }
                }
            } catch (error) {
                alert("Oops! Couldn't generate words right now. Check your connection.");
            }
            
            btn.innerText = "Auto-Fill";
        }

        async function runGame() {
            const svg = document.getElementById('origami');
            const resText = document.getElementById('result');
            const corner = parseInt(document.getElementById('corner').value);
            const num = parseInt(document.getElementById('num').value);
            
            resText.innerText = "";
            const moves = corner + (num % 5) + 2; 
            
            for (let i = 0; i < moves; i++) {
                svg.parentElement.className = 'game-window ' + (i % 2 === 0 ? 'mode-v' : 'mode-h');
                await new Promise(r => setTimeout(r, 300));
            }
            
            svg.parentElement.className = 'game-window';
            
            const inputs = document.querySelectorAll('#flavorInputs input');
            const outcomes = Array.from(inputs).map(inp => inp.value);
            const index = ((corner - 1) * 2 + (num % 2)) % 8;
            
            setTimeout(() => {
                resText.innerText = outcomes[index];
            }, 200);
        }
    </script>
</body>
</html>
